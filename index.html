<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Projeto Integrador AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  embedded
  vr-mode-ui="enabled:false"
  arjs="
    sourceType: webcam;
    debugUIEnabled: false;
    smoothing: true;
    smoothingCount: 10;
    smoothingTolerance: 0.01;
    smoothingThreshold: 5;
  ">

  <a-marker preset="hiro">

    <!-- Ajuste para marcador na vertical -->
    <a-entity rotation="-90 0 0">

      <!-- BLOCO DE TEXTOS -->
      <a-entity position="0 0.35 -1.0">

        <!-- TÍTULO -->
        <a-text
          value="Projeto Integrador - GRAN"
          position="0 0.35 0.02"
          align="center"
          width="4"
          color="#00FFFF"
          material="depthTest:false">
        </a-text>

        <!-- PAINEL -->
        <a-plane
          position="0 0.05 0"
          width="3"
          height="0.7"
          color="#000000"
          opacity="0.75">
        </a-plane>

        <!-- SUBTÍTULO -->
        <a-text
          id="status"
          value="Inicializando..."
          position="0 0.18 0.03"
          align="center"
          width="3"
          color="#00FFAA"
          material="depthTest:false">
        </a-text>

      </a-entity>

      <!-- IMAGEM PROJETADA (COM FADE) -->
      <a-plane
        id="logo"
        position="0 -0.05 -0.55"
        width="0.7"
        height="0.7"
        material="
          src: GRAN.jpg;
          transparent: true;
          opacity: 0.85;
          depthTest: false;
          shader: flat;
        ">

        <!-- Rotação suave -->
        <a-animation
          attribute="rotation"
          from="0 0 0"
          to="0 360 0"
          dur="8000"
          easing="linear"
          repeat="indefinite">
        </a-animation>

      </a-plane>

    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
  const mensagens = [
    "Inicializando...",
    "GRAN Faculdade",
    "Engenharia de Software",
    "Aluna: Maria Clara Rocha",
    "3° semestre",
    "Realidade Virtual (RV)",
    "Realidade Aumentada (RA)"
  ];

  const imagens = [
    "GRAN.jpg",
    "GRAN2.png"
  ];

  let indiceTexto = 0;
  let indiceImagem = 0;

  setInterval(() => {
    const texto = document.querySelector("#status");
    const logo = document.querySelector("#logo");

    if (!texto || !logo) return;

    // Atualiza texto
    texto.setAttribute("value", mensagens[indiceTexto]);
    indiceTexto = (indiceTexto + 1) % mensagens.length;

    // Fade out
    logo.setAttribute("animation__fadeout", {
      property: "material.opacity",
      to: 0,
      dur: 500,
      easing: "easeInOutQuad"
    });

    // Troca imagem no meio do fade
    setTimeout(() => {
      indiceImagem = (indiceImagem + 1) % imagens.length;
      logo.setAttribute("material", "src", imagens[indiceImagem]);

      // Fade in
      logo.setAttribute("animation__fadein", {
        property: "material.opacity",
        to: 0.85,
        dur: 500,
        easing: "easeInOutQuad"
      });
    }, 500);

  }, 2000);
</script>

</body>
</html>
