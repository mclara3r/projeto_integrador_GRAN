<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Projeto Integrador AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  embedded
  vr-mode-ui="enabled:false"
  arjs="
    sourceType: webcam;
    debugUIEnabled: false;
    smoothing: true;
    smoothingCount: 10;
    smoothingTolerance: 0.01;
    smoothingThreshold: 5;
  ">

  <a-marker preset="hiro">

    <!-- Marcador em pé -->
    <a-entity rotation="-90 0 0">

      <!-- BLOCO DE TEXTOS -->
      <a-entity position="0 0.35 -1.0">

        <a-text
          value="Projeto Integrador"
          position="0 0.35 0.02"
          align="center"
          width="4"
          color="#00FFFF"
          material="depthTest:false">
        </a-text>

        <a-plane
          position="0 0.05 0"
          width="3"
          height="0.7"
          color="#000000"
          opacity="0.75">
        </a-plane>

        <a-text
          id="status"
          value="Inicializando..."
          position="0 0.18 0.03"
          align="center"
          width="3"
          color="#00FFAA"
          material="depthTest:false">
        </a-text>

      </a-entity>

      <!-- IMAGEM PROJETADA -->
      <a-plane
        id="logo"
        position="0 -0.05 -0.55"
        width="0.7"
        height="0.7"
        material="
          src: GRAN.jpg;
          transparent: true;
          opacity: 0.85;
          depthTest: false;
          shader: flat;
        ">
      </a-plane>

    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  const slides = [
    
    { texto: "GRAN Faculdade...", imagem: "GRAN2.png" },
    { texto: "Engenharia de Software...", imagem: "GRAN.jpg" },
    { texto: "Aluna: Maria Clara Rocha", imagem: "GRAN2.png" },
    { texto: "3o semestre...", imagem: "GRAN.jpg" },
    { texto: "Realidade Virtual (RV)...", imagem: "GRAN2.png" },
    { texto: "Realidade Aumentada (RA)...", imagem: "GRAN.jpg" }
  ];

  let indice = 0;
  const tempoSlide = 3000;
  const duracaoFade = 800;
  const opacidadeMax = 0.85;

  const textoEl = document.querySelector("#status");
  const logoEl = document.querySelector("#logo");

  function fade(opacidadeInicial, opacidadeFinal, duracao, callback) {
    const inicio = performance.now();

    function animar(agora) {
      const progresso = Math.min((agora - inicio) / duracao, 1);
      const valor = opacidadeInicial + (opacidadeFinal - opacidadeInicial) * progresso;

      logoEl.setAttribute("material", "opacity", valor);

      if (progresso < 1) {
        requestAnimationFrame(animar);
      } else if (callback) {
        callback();
      }
    }

    requestAnimationFrame(animar);
  }

  function trocarSlide() {
    // Fade out suave
    fade(opacidadeMax, 0, duracaoFade, () => {
      // Troca conteúdo no meio do fade
      textoEl.setAttribute("value", slides[indice].texto);
      logoEl.setAttribute("material", "src", slides[indice].imagem);

      // Fade in suave
      fade(0, opacidadeMax, duracaoFade);

      indice = (indice + 1) % slides.length;
    });
  }

  setInterval(trocarSlide, tempoSlide);
</script>
``

</body>
</html>
